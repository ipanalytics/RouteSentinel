name: daily-dataset

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: routesentinel-daily-dataset-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system MRT parser
        run: sudo apt-get update && sudo apt-get install -y bgpdump

      - name: Install RouteSentinel
        run: python -m pip install ".[dev]"

      - name: Test
        run: pytest

      - name: Set date
        id: date
        run: |
          today="$(date -u +%F)"
          generated_at="$(date -u '+%Y-%m-%d %H:%M UTC')"
          {
            echo "today=${today}"
            echo "generated_at=${generated_at}"
            echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${today}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore source cache
        uses: actions/cache@v4
        with:
          path: data/raw
          key: routesentinel-raw-${{ steps.date.outputs.today }}

      - name: Fetch BGP RIB and VRPs
        run: |
          mkdir -p data/raw data/normalized out
          routesentinel fetch https://data.ris.ripe.net/rrc00/latest-bview.gz data/raw/rrc00-latest-bview.gz
          routesentinel fetch https://console.rpki-client.org/vrps.json data/raw/vrps.json

      - name: Parse MRT
        run: routesentinel parse-mrt data/raw/rrc00-latest-bview.gz data/normalized/rrc00.csv --collector rrc00

      - name: Build snapshot
        run: routesentinel snapshot --announcements data/normalized/rrc00.csv --vrps data/raw/vrps.json --out out

      - name: Write changelog
        run: |
          {
            echo "# RouteSentinel ${{ steps.date.outputs.today }}"
            echo
            echo "Release updated: ${{ steps.date.outputs.generated_at }}"
            echo
            echo "Daily RPKI/BGP snapshot generated from RIPE RIS rrc00 and public VRP JSON."
            echo
            cat out/rpki-summary.json
          } > out/changelog.md

      - name: Publish dataset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.today }}
          name: RouteSentinel ${{ steps.date.outputs.today }}
          body_path: out/changelog.md
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            out/rpki-summary.json
            out/rpki-invalids.csv
            out/suspected-events.jsonl
            out/changelog.md

      - name: Sync branch before README update
        run: git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Update README stats
        run: |
          python scripts/update_readme_stats.py \
            --summary out/rpki-summary.json \
            --date "${{ steps.date.outputs.today }}" \
            --release-url "${{ steps.date.outputs.release_url }}" \
            --updated-at "${{ steps.date.outputs.generated_at }}"

      - name: Commit README stats
        run: |
          if git diff --quiet README.md; then
            echo "README stats unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update RouteSentinel snapshot stats"
          git push || {
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          }
